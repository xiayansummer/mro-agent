services:
  memos:
    image: neosmemo/memos:stable
    container_name: mro-memos
    ports:
      - "127.0.0.1:5230:5230"
    volumes:
      - ./memos-data:/var/opt/memos
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: mro-backend
    env_file: ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - memos
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mro-frontend
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      - backend
    restart: unless-stopped
